name: Test - check if caches exist

on:
  push:
    paths:
      - '.github/workflows/test-cache.yaml'
  workflow_dispatch:

jobs:
  fetch-caches:
    name: Fetch caches
    runs-on: ubuntu-latest
    env:
      node-version: 24

    steps:
      - name: Fetch caches
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            async function getCaches() {
                const response = await fetch(`https://api.github.com/repos/${{ github.repository }}/actions/caches`, {
                  headers: {
                    Authorization: `Bearer ${{ github.token }}`,
                    "X-GitHub-Api-Version": "2022-11-28",
                  },
                });
                const cacheData = await response.json();
                return cacheData;
            }

            const getCachesResult = await getCaches();

            // expect 'lts-versions-go' and 'lts-versions-python' to exist
            // that includes cache "from" main and other branches
            const expectedLTScache = 2;
            let ltsCache = 0;
            getCachesResult.actions_caches.forEach((cache) => {
                if (cache.key === 'lts-versions-go' || cache.key === 'lts-versions-python') {
                  ltsCache++
                }
            });
            console.log(`Returned cache:\n${getCachesResult}`);
            if (ltsCache < expectedLTScache) {
                throw new Error(`Could not find LTS cache for python and go. Found number of cache: ${ltsCache}`);
            }
            console.log("'oll korrect!'");