name: Test - check if caches exist
on:
  push:
    paths:
      - '.github/workflows/test-cache.yaml'
  workflow_dispatch:

jobs:
  fetch-caches:
    name: Fetch caches
    runs-on: ubuntu-latest
    env:
      node-version: 24

    steps:
      - name: Fetch caches
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            async function checkCaches() {
              const response = await fetch(`https://api.github.com/repos/${process.env.GITHUB_REPOSITORY}/actions/caches`, {
                headers: {
                  Authorization: `Bearer ${process.env.GITHUB_TOKEN}`,
                  "X-GitHub-Api-Version": "2022-11-28",
                },
              });
              const cacheData = await response.json();
              console.log("Available caches: ", cacheData);
            }
            checkCaches();
